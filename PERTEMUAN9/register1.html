<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Halaman Registrasi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-box">
        <h2>Silahkan Isikan Data</h2>
        <form>
            <div class="user-box">
                <input type="text" name="first_name" required="">
                <label>First name</label>
            </div>
            <div class="user-box">
                <input type="text" name="middle_name" required="">
                <label>Middle name</label>
            </div>
            <div class="user-box">
                <input type="text" name="last_name" required="">
                <label>Last name</label>
            </div>
            <div class="user-box">
                <input type="date" name="tanggal_lahir" required="">
                <label style="top: -20px; font-size: 12px;">Tanggal Lahir</label>
            </div>
            <div class="user-box">
                <label style="position: static; margin-bottom: 10px; display: block;">Jenis Kelamin</label>
                <input type="radio" name="jk" value="pria"> Pria
                <input type="radio" name="jk" value="wanita"> Wanita
            </div>
            <div class="user-box" style="margin-top: 20px;">
                <input type="text" name="tempat_tinggal" required="">
                <label>Tempat Tinggal</label>
            </div>
            <div class="user-box">
                <input type="email" name="email" required="">
                <label>Email</label>
            </div>
            <div class="user-box">
                <input type="tel" name="phone" required="">
                <label>Phone</label>
            </div>
            <div class="user-box">
                <input type="password" name="password" required="">
                <label>Password</label>
            </div>
            
            <a href="#">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                REGISTER
            </a>
        </form>
        
        <div class="bawah">
            <p>Kembali <a href="#">Back</a></p>
        </div>
    </div>

</body>
</html>
