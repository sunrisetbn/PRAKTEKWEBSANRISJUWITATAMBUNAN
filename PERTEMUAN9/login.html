<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="login-box">
      <h2 id="keterangan">Silahkan Masuk</h2>
      <form>
        <div class="user-box">
          <input type="text" id="usr" required="" />
          <label>Username</label>
        </div>
        <div class="user-box">
          <input type="password" id="pass" required="" />
          <label>Password</label>
        </div>
        <a href="#" class="btn-submit" onclick="cek()">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          Login
        </a>
      </form>

      <div class="bawah">
        <span class="test"
          >Belum punya akun? <a href="register.html">Register</a></span
        >
        <br />
        <span class="test"
          >Kembali
          <a
            href="index.html"
            onclick="if(history.length > 1){ event.preventDefault(); history.back(); }"
            >Back</a
          ></span
        >
      </div>
    </div>

    <script>
      function cek() {
        let username = document.getElementById("usr").value;
        let password = document.getElementById("pass").value;

        if (username == "andre" && password == "web") {
          document.getElementById("keterangan").innerHTML = "Login Sukses";
          document.getElementById("keterangan").style.color = "#2ecc71"; // Berubah hijau saat sukses
        } else {
          document.getElementById("keterangan").innerHTML =
            "Username atau Password Salah";
          document.getElementById("keterangan").style.color = "#e74c3c"; // Berubah merah saat salah
        }
      }
    </script>
  </body>
</html>
