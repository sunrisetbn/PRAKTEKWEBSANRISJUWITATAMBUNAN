<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="assets/styles/register.css">
</head>
<body>
    <div class="register-box">
        <h2>Silahkan Isikan Data</h2>
        <form>
            <div class="input-group">
                <label for="fname">First name</label>
                <input type="text" id="fname" name="fname">
            </div>

            <div class="input-group">
                <label for="mname">Middle name</label>
                <input type="text" id="mname" name="mname">
            </div>

            <div class="input-group">
                <label for="lname">Last name</label>
                <input type="text" id="lname" name="lname">
            </div>

            <div class="input-group">
                <label for="tgl_lahir">Tanggal Lahir</label>
                <input type="date" id="tgl_lahir" name="tgl_lahir">
            </div>

            <div class="input-group jenis-kelamin">
                <label>Jenis Kelamin</label>
                <span>
                    <input type="radio" id="pria" name="jenis_kelamin" value="pria">
                    <label for="pria" class="radio-label">Pria</label>
                </span>
                <span>
                    <input type="radio" id="wanita" name="jenis_kelamin" value="wanita">
                    <label for="wanita" class="radio-label">Wanita</label>
                </span>
            </div>

            <div class="input-group">
                <label for="tempat_tinggal">Tempat Tinggal</label>
                <input type="text" id="tempat_tinggal" name="tempat_tinggal">
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="input-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password">
            </div>

            <button type="submit" class="btn-register">REGISTER</button>
        </form>

        <div class="bawah">
            <span class="test">Kembali <a href="login.html">Back</a></span>
        </div>
    </div>
</body>
</html>
